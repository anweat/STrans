services:
  mediamtx:
    image: ${MEDIAMTX_IMAGE:-bluenviron/mediamtx:1.19.2}
    restart: unless-stopped
    volumes:
      - ./generated/mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "8554:8554/tcp"
      - "1935:1935/tcp"
      - "8888:8888/tcp"
      - "8889:8889/tcp"
      - "8890:8890/udp"
      - "8189:8189/udp"
      - "8189:8189/tcp"
    networks:
      - streaming

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      - mediamtx
    environment:
      STREAM_DOMAIN: ${STREAM_DOMAIN:?Set STREAM_DOMAIN in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
      - "443:443/udp"
    networks:
      - streaming

networks:
  streaming:

volumes:
  caddy_data:
  caddy_config:
